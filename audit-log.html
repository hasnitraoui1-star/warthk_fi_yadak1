<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجل التدقيق | ورثك فاليد - الحل السريع</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --green-dark: #006633;
            --green-light: #00A859;
            --green-bg: #e6f5ee;
            --red: #D21034;
            --red-light: #fde8ec;
            --white: #FFFFFF;
            --off-white: #F8F9FA;
            --gray-50: #F7F8FA;
            --gray-100: #F0F2F5;
            --gray-200: #E4E7EB;
            --gray-300: #CBD2D9;
            --gray-400: #9BA5B2;
            --gray-500: #7B8794;
            --gray-700: #3E4C59;
            --gray-900: #1F2933;
            --admin-accent: #2c3e50;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 6px rgba(0,0,0,0.07), 0 2px 4px rgba(0,0,0,0.06);
            --shadow-lg: 0 10px 25px rgba(0,0,0,0.1), 0 4px 10px rgba(0,0,0,0.05);
            --radius: 12px;
            --radius-lg: 16px;
            --transition: 0.2s ease;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #f0f5f2 0%, #eaf5ee 100%);
            min-height: 100vh;
            color: var(--gray-900);
            line-height: 1.6;
        }

        .top-nav {
            background: var(--white);
            border-bottom: 1px solid var(--gray-200);
            padding: 0 24px;
            height: 64px;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: var(--shadow-sm); position: sticky; top: 0; z-index: 100;
        }
        .logo-area { display: flex; align-items: center; gap: 10px; }
        .logo-icon {
            width: 36px; height: 36px; background: var(--green-dark); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; color: white; font-weight: 800; font-size: 18px;
        }
        .logo-text-nav { font-weight: 800; font-size: 18px; color: var(--green-dark); }
        .admin-badge {
            background: var(--admin-accent); color: white; padding: 4px 12px; border-radius: 20px;
            font-size: 13px; font-weight: 600; margin-right: 10px;
        }
        .user-area { display: flex; align-items: center; gap: 16px; }
        .back-link { color: var(--green-dark); text-decoration: none; font-weight: 600; font-size: 14px; cursor: pointer; }
        .back-link:hover { text-decoration: underline; }

        .main-container { max-width: 1300px; margin: 0 auto; padding: 24px; }
        .page-header { margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
        .greeting { font-size: 26px; font-weight: 800; color: var(--gray-900); }
        .text-muted { color: var(--gray-500); font-size: 13px; }

        .filter-bar {
            background: var(--white); border-radius: var(--radius-lg); padding: 16px 20px;
            box-shadow: var(--shadow-sm); margin-bottom: 24px;
            display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
        }
        .filter-group { display: flex; align-items: center; gap: 8px; flex: 1 1 200px; }
        .filter-group label { font-weight: 600; font-size: 13px; white-space: nowrap; }
        select, input {
            padding: 10px 12px; border: 1.5px solid var(--gray-200); border-radius: var(--radius);
            font-family: 'Cairo', sans-serif; font-size: 14px; background: var(--off-white);
            width: 100%;
        }
        select:focus, input:focus { border-color: var(--green-light); outline: none; box-shadow: 0 0 0 3px rgba(0,168,89,0.15); }
        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 10px 18px; border-radius: var(--radius); font-weight: 700;
            font-family: 'Cairo', sans-serif; font-size: 14px; cursor: pointer; border: none;
            transition: all var(--transition); text-decoration: none; color: white;
            background: var(--green-dark); box-shadow: var(--shadow-sm); gap: 6px;
        }
        .btn:hover { background: #005a2b; }
        .btn-outline {
            background: transparent; border: 1.5px solid var(--green-dark); color: var(--green-dark); box-shadow: none;
        }
        .btn-outline:hover { background: rgba(0,102,51,0.05); }
        .btn-sm { padding: 6px 14px; font-size: 13px; }

        .card {
            background: var(--white); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm);
            overflow: hidden;
        }
        .card-body { padding: 0; }

        .log-table {
            width: 100%; border-collapse: collapse;
        }
        .log-table th {
            background: var(--gray-50); padding: 14px 16px; text-align: right;
            font-weight: 700; font-size: 13px; color: var(--gray-700); border-bottom: 2px solid var(--gray-200);
        }
        .log-table td {
            padding: 14px 16px; border-bottom: 1px solid var(--gray-100); font-size: 13px;
        }
        .log-table tr:hover td { background: var(--gray-50); }
        .log-action {
            padding: 3px 10px; border-radius: 20px; font-weight: 600; font-size: 12px;
            display: inline-block;
        }
        .action-login { background: #e0f0ff; color: #0077b6; }
        .action-vdr { background: #f3e5f5; color: #7b1fa2; }
        .action-offer { background: #fff3e0; color: #f57c00; }
        .action-case { background: var(--green-bg); color: var(--green-dark); }
        .action-user { background: var(--red-light); color: var(--red); }
        .action-document { background: #fdf2e9; color: #8B4513; }

        .pagination {
            display: flex; justify-content: center; gap: 8px; padding: 16px;
        }
        .page-btn {
            padding: 8px 14px; border: 1px solid var(--gray-300); border-radius: var(--radius);
            background: white; cursor: pointer; font-weight: 600; transition: var(--transition);
        }
        .page-btn.active { background: var(--green-dark); color: white; border-color: var(--green-dark); }
        .page-btn:hover:not(.active) { background: var(--gray-100); }

        .empty-state { text-align: center; padding: 40px; color: var(--gray-400); }
        .empty-state .icon { font-size: 48px; margin-bottom: 16px; }

        .footer { text-align: center; padding: 16px; font-size: 12px; color: var(--gray-400); border-top: 1px solid var(--gray-200); margin-top: 24px; }
    
        /* Language Switcher */
        .lang-switch {
            display: flex;
            gap: 6px;
            margin-left: 16px;
        }
        .lang-btn {
            padding: 6px 12px;
            border-radius: 20px;
            border: none;
            background: transparent;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            color: var(--gray-700);
            transition: 0.2s;
            font-family: 'Cairo', sans-serif;
        }
        .lang-btn.active {
            background: var(--green-dark);
            color: white;
            box-shadow: 0 2px 6px rgba(0,102,51,0.2);
        }
    </style>
</head>
<body>
    <nav class="top-nav">
        <div class="logo-area">
            <div class="logo-icon">و</div>
            <span class="logo-text-nav" data-translate="brand">ورثك فاليد</span>
            <span class="admin-badge" data-translate="nav_admin">🛡️ مدير النظام</span>
        </div>
        <div class="user-area">
            <div class="lang-switch">
                <button class="lang-btn active" data-lang="ar" data-lang-switch onclick="changeLanguage('ar')">🇩🇿 العربية</button>
                <button class="lang-btn" data-lang="fr" data-lang-switch onclick="changeLanguage('fr')">🇫🇷 Français</button>
                <button class="lang-btn" data-lang="en" data-lang-switch onclick="changeLanguage('en')">🇬🇧 English</button>
            </div>
            <a href="manager-dashboard.html" class="back-link" data-translate="back_to_dashboard">↩ لوحة التحكم</a>
        </div>
    </nav>

    <div class="main-container">
        <div class="page-header">
            <div>
                <h1 class="greeting" data-translate="audit_title">سجل التدقيق</h1>
                <p class="text-muted" data-translate="audit_subtitle">جميع أحداث النظام مسجلة هنا. يمكنك تصفية السجلات حسب المستخدم، نوع الإجراء، ونوع الكيان.</p>
            </div>
            <button class="btn btn-outline btn-sm" id="exportLogBtn" data-translate="audit_export_csv">📥 تصدير CSV</button>
        </div>

        <!-- Filters -->
        <div class="filter-bar">
            <div class="filter-group">
                <label>المستخدم</label>
                <input type="text" id="filterUser" data-translate-placeholder="ph_name_or_email" placeholder="اسم أو بريد إلكتروني...">
            </div>
            <div class="filter-group">
                <label>الإجراء</label>
                <select id="filterAction">
                    <option value="">الكل</option>
                    <option>تسجيل دخول</option>
                    <option>vdr_view</option>
                    <option>تقديم عرض</option>
                    <option>فتح قضية</option>
                    <option>تعديل مستخدم</option>
                    <option>رفع مستند</option>
                </select>
            </div>
            <div class="filter-group">
                <label>نوع الكيان</label>
                <select id="filterEntity">
                    <option value="">الكل</option>
                    <option>property</option>
                    <option>case</option>
                    <option>user</option>
                    <option>document</option>
                </select>
            </div>
            <div class="filter-group" style="flex:1;">
                <label>من</label>
                <input type="date" id="filterDateFrom">
            </div>
            <div class="filter-group" style="flex:1;">
                <label>إلى</label>
                <input type="date" id="filterDateTo">
            </div>
            <button class="btn btn-sm" id="applyFilterBtn" data-translate="apply_filter">🔍 تطبيق</button>
        </div>

        <!-- Log Table -->
        <div class="card">
            <div class="card-body">
                <table class="log-table">
                    <thead>
                        <tr>
                            <th data-translate="audit_timestamp">التاريخ والوقت</th>
                            <th data-translate="users_table_user">المستخدم</th>
                            <th data-translate="audit_action">الإجراء</th>
                            <th data-translate="audit_entity_type">نوع الكيان</th>
                            <th data-translate="audit_entity_id">معرف الكيان</th>
                            <th data-translate="audit_ip">IP</th>
                        </tr>
                    </thead>
                    <tbody id="logTableBody">
                        <!-- Dynamically filled -->
                    </tbody>
                </table>
                <div class="pagination" id="pagination"></div>
            </div>
        </div>
    </div>

    <div class="footer" data-translate="footer">
        © 2025 ورثك فاليد - الحل السريع. جميع الحقوق محفوظة. الجزائر.
    </div>

    <script src="js/translations.js"></script>
<script src="js/i18n.js"></script>
<script>
        (function() {
            const logs = [
                { id:1, timestamp:'2026-05-17 14:35:22', user:'ليلى بن عمار', action:'vdr_view', entityType:'property_document', entityId:'PROP-042-DOC-1', ip:'192.168.1.100' },
                { id:2, timestamp:'2026-05-17 14:20:10', user:'نور الدين سليماني', action:'تقديم عرض', entityType:'offer', entityId:'OFF-2026-105', ip:'192.168.1.101' },
                { id:3, timestamp:'2026-05-17 13:45:05', user:'محمد بن صالح', action:'فتح قضية', entityType:'case', entityId:'C-2026-042', ip:'192.168.1.102' },
                { id:4, timestamp:'2026-05-17 12:10:33', user:'الأستاذ كمال بومدين', action:'رفع مستند', entityType:'document', entityId:'DOC-2026-117', ip:'192.168.1.103' },
                { id:5, timestamp:'2026-05-17 11:05:18', user:'عادل زعيم', action:'تعديل مستخدم', entityType:'user', entityId:'USR-009', ip:'192.168.1.104' },
                { id:6, timestamp:'2026-05-17 10:00:00', user:'ليلى بن عمار', action:'تسجيل دخول', entityType:'session', entityId:'SESS-2026-05-17-001', ip:'192.168.1.100' },
                { id:7, timestamp:'2026-05-16 16:20:44', user:'سفيان بلقاسم', action:'vdr_view', entityType:'property_document', entityId:'PROP-043-DOC-2', ip:'192.168.1.105' },
                { id:8, timestamp:'2026-05-16 15:12:30', user:'رشيد زعيمي', action:'رفع مستند', entityType:'document', entityId:'DOC-2026-115', ip:'192.168.1.106' }
            ];

            let filteredLogs = [...logs];
            const rowsPerPage = 5;
            let currentPage = 1;

            const tableBody = document.getElementById('logTableBody');
            const paginationEl = document.getElementById('pagination');

            function getActionClass(action) {
                if (action.includes('دخول')) return 'action-login';
                if (action.includes('vdr')) return 'action-vdr';
                if (action.includes('عرض')) return 'action-offer';
                if (action.includes('قضية')) return 'action-case';
                if (action.includes('مستخدم')) return 'action-user';
                if (action.includes('مستند')) return 'action-document';
                return '';
            }

            function renderTable() {
                const totalPages = Math.ceil(filteredLogs.length / rowsPerPage) || 1;
                const start = (currentPage - 1) * rowsPerPage;
                const pageLogs = filteredLogs.slice(start, start + rowsPerPage);

                if (pageLogs.length === 0) {
                    tableBody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><div class="icon">📝</div><p>لا توجد سجلات مطابقة.</p></div></td></tr>`;
                    paginationEl.innerHTML = '';
                    return;
                }

                tableBody.innerHTML = pageLogs.map(log => `
                    <tr>
                        <td>${log.timestamp}</td>
                        <td>${log.user}</td>
                        <td><span class="log-action ${getActionClass(log.action)}">${log.action}</span></td>
                        <td>${log.entityType}</td>
                        <td>${log.entityId}</td>
                        <td>${log.ip}</td>
                    </tr>
                `).join('');

                let pagHTML = '';
                for (let i = 1; i <= totalPages; i++) {
                    pagHTML += `<button class="page-btn ${i === currentPage ? 'active' : ''}" data-page="${i}">${i}</button>`;
                }
                paginationEl.innerHTML = pagHTML;

                document.querySelectorAll('.page-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        currentPage = parseInt(this.dataset.page);
                        renderTable();
                    });
                });
            }

            function applyFilters() {
                const user = document.getElementById('filterUser').value.toLowerCase();
                const action = document.getElementById('filterAction').value;
                const entity = document.getElementById('filterEntity').value;
                const from = document.getElementById('filterDateFrom').value;
                const to = document.getElementById('filterDateTo').value;

                filteredLogs = logs.filter(log => {
                    return (!user || log.user.includes(user)) &&
                           (!action || log.action === action) &&
                           (!entity || log.entityType === entity) &&
                           (!from || log.timestamp >= from) &&
                           (!to || log.timestamp <= to + ' 23:59:59');
                });
                currentPage = 1;
                renderTable();
            }

            document.getElementById('applyFilterBtn').addEventListener('click', applyFilters);
            document.getElementById('exportLogBtn').addEventListener('click', () => {
                alert(t('msg_export_audit_csv'));
            });

            renderTable();
            console.log('صفحة سجل التدقيق جاهزة.');
        

            // Re-render dynamic content on language change
            window.addEventListener('languageChanged', function(e) {
            applyFilters();
            });
        })();
    </script>
</body>
</html>
