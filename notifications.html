<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الإشعارات | ورثك فاليد - الحل السريع</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --green-dark: #006633;
            --green-light: #00A859;
            --green-bg: #e6f5ee;
            --red: #D21034;
            --red-light: #fde8ec;
            --white: #FFFFFF;
            --off-white: #F8F9FA;
            --gray-50: #F7F8FA;
            --gray-100: #F0F2F5;
            --gray-200: #E4E7EB;
            --gray-300: #CBD2D9;
            --gray-400: #9BA5B2;
            --gray-500: #7B8794;
            --gray-700: #3E4C59;
            --gray-900: #1F2933;
            --notif-accent: #1e5f74;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 6px rgba(0,0,0,0.07), 0 2px 4px rgba(0,0,0,0.06);
            --shadow-lg: 0 10px 25px rgba(0,0,0,0.1), 0 4px 10px rgba(0,0,0,0.05);
            --radius: 12px;
            --radius-lg: 16px;
            --transition: 0.2s ease;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Cairo', sans-serif;
            background: #f4f6f9;
            min-height: 100vh;
            color: var(--gray-900);
            line-height: 1.6;
        }

        .top-nav {
            background: var(--white);
            border-bottom: 1px solid var(--gray-200);
            padding: 0 24px;
            height: 64px;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: var(--shadow-sm); position: sticky; top: 0; z-index: 100;
        }
        .logo-area { display: flex; align-items: center; gap: 10px; }
        .logo-icon {
            width: 36px; height: 36px; background: var(--green-dark); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; color: white; font-weight: 800; font-size: 18px;
        }
        .logo-text-nav { font-weight: 800; font-size: 18px; color: var(--green-dark); }
        .wilaya-tag {
            background: #e0f0f7; color: var(--notif-accent); padding: 4px 12px; border-radius: 20px;
            font-size: 13px; font-weight: 600; margin-right: 10px;
        }
        .user-area { display: flex; align-items: center; gap: 16px; }
        .back-link { color: var(--green-dark); text-decoration: none; font-weight: 600; font-size: 14px; cursor: pointer; }
        .back-link:hover { text-decoration: underline; }

        .main-container { max-width: 900px; margin: 0 auto; padding: 24px; }
        .page-header { margin-bottom: 24px; }
        .greeting { font-size: 26px; font-weight: 800; color: var(--gray-900); }
        .text-muted { color: var(--gray-500); font-size: 13px; }

        .filter-bar {
            background: var(--white); border-radius: var(--radius-lg); padding: 12px 20px;
            box-shadow: var(--shadow-sm); margin-bottom: 20px;
            display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
        }
        .filter-option {
            font-weight: 600; font-size: 14px; cursor: pointer; padding: 8px 16px; border-radius: 20px;
            transition: all var(--transition); background: transparent; color: var(--gray-700);
        }
        .filter-option.active {
            background: var(--green-bg); color: var(--green-dark);
        }
        .filter-option:hover:not(.active) { background: var(--gray-100); }
        .mark-all-btn {
            margin-right: auto; background: none; border: none; color: var(--green-dark);
            font-weight: 600; cursor: pointer; font-size: 13px;
        }
        .mark-all-btn:hover { text-decoration: underline; }

        .card {
            background: var(--white); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm);
            overflow: hidden;
        }
        .card-body { padding: 0; }

        .notification-item {
            padding: 16px 20px;
            border-bottom: 1px solid var(--gray-100);
            display: flex; align-items: flex-start; gap: 14px;
            transition: background var(--transition);
            cursor: pointer;
        }
        .notification-item:hover { background: var(--gray-50); }
        .notification-item.unread {
            background: #f9fdfb;
            border-right: 4px solid var(--green-dark);
        }
        .notif-icon {
            width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 20px;
            flex-shrink: 0;
        }
        .notif-content { flex: 1; }
        .notif-title {
            font-weight: 700; font-size: 15px; color: var(--gray-900); margin-bottom: 4px;
        }
        .notif-description { font-size: 13px; color: var(--gray-500); margin-bottom: 6px; }
        .notif-time { font-size: 11px; color: var(--gray-400); }
        .notif-actions { display: flex; gap: 8px; align-items: center; }
        .btn-sm {
            background: none; border: 1px solid var(--gray-300); padding: 4px 12px;
            border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer;
            color: var(--gray-700); transition: all var(--transition);
        }
        .btn-sm:hover { background: var(--gray-100); }
        .btn-mark-read {
            color: var(--green-dark); border-color: var(--green-dark); background: transparent;
        }
        .btn-mark-read:hover { background: var(--green-bg); }

        .empty-state {
            text-align: center; padding: 60px 20px; color: var(--gray-400);
        }
        .empty-state .icon { font-size: 48px; margin-bottom: 16px; }

        .footer { text-align: center; padding: 16px; font-size: 12px; color: var(--gray-400); border-top: 1px solid var(--gray-200); margin-top: 24px; }
    
        /* Language Switcher */
        .lang-switch {
            display: flex;
            gap: 6px;
            margin-left: 16px;
        }
        .lang-btn {
            padding: 6px 12px;
            border-radius: 20px;
            border: none;
            background: transparent;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            color: var(--gray-700);
            transition: 0.2s;
            font-family: 'Cairo', sans-serif;
        }
        .lang-btn.active {
            background: var(--green-dark);
            color: white;
            box-shadow: 0 2px 6px rgba(0,102,51,0.2);
        }
    </style>
</head>
<body>
    <nav class="top-nav">
        <div class="logo-area">
            <div class="logo-icon">و</div>
            <span class="logo-text-nav" data-translate="brand">ورثك فاليد</span>
            <span class="wilaya-tag" data-translate="nav_notifications">🔔 الإشعارات</span>
        </div>
        <div class="user-area">
            <div class="lang-switch">
                <button class="lang-btn active" data-lang="ar" data-lang-switch onclick="changeLanguage('ar')">🇩🇿 العربية</button>
                <button class="lang-btn" data-lang="fr" data-lang-switch onclick="changeLanguage('fr')">🇫🇷 Français</button>
                <button class="lang-btn" data-lang="en" data-lang-switch onclick="changeLanguage('en')">🇬🇧 English</button>
            </div>
            <a href="case-detail.html" class="back-link" data-translate="back_to_dashboard">↩ لوحة التحكم</a>
        </div>
    </nav>

    <div class="main-container">
        <div class="page-header">
            <h1 class="greeting" data-translate="notif_title">الإشعارات</h1>
            <p class="text-muted" data-translate="notif_subtitle">جميع تنبيهاتك ورسائلك المهمة في مكان واحد.</p>
        </div>

        <!-- Filter Bar -->
        <div class="filter-bar">
            <span class="filter-option active" data-filter="all" data-translate="all">الكل</span>
            <span class="filter-option" data-filter="unread" data-translate="notif_unread">غير مقروءة</span>
            <span class="filter-option" data-filter="important" data-translate="notif_important">مهمة</span>
            <button class="mark-all-btn" id="markAllRead" data-translate="mark_all_read">✅ تعليم الكل كمقروء</button>
        </div>

        <!-- Notifications List -->
        <div class="card">
            <div class="card-body" id="notificationsList"></div>
        </div>
    </div>

    <div class="footer" data-translate="footer">
        © 2026 ورثك فاليد - الحل السريع. جميع الحقوق محفوظة. الجزائر.
    </div>

    <script src="js/translations.js"></script>
<script src="js/i18n.js"></script>
<script>
        (function() {
            const notifications = [
                { id: 1, title: 'محامي جديد مقترح', description: 'الأستاذ كمال بومدين مهتم بقضيتك في وهران. راجع ملفه.', time: 'قبل ساعة', icon: '⚖️', iconBg: '#e0f0ff', important: true, read: false },
                { id: 2, title: 'عرض سعر جديد', description: 'مستثمر قدم عرضاً على عقار الحسينية بقيمة 15.2 مليون دج.', time: 'قبل 3 ساعات', icon: '💰', iconBg: '#fff3e0', important: true, read: false },
                { id: 3, title: 'تذكير بموعد جلسة', description: 'جلسة نفسية مع الأخصائية سامية يوم الغد الساعة 10:00.', time: 'قبل 6 ساعات', icon: '🧠', iconBg: '#f3e5f5', important: false, read: false },
                { id: 4, title: 'تم توقيع NDA', description: 'تم توقيع اتفاقية السرية للعقار فيلا الأبيار. يمكنك دخول غرفة البيانات.', time: 'أمس', icon: '🔒', iconBg: '#e6f5ee', important: false, read: true },
                { id: 5, title: 'توزيع أرباح', description: 'مشروع التمويل الجماعي "الخروب" وزع 120,000 دج في محفظتك.', time: 'قبل 3 أيام', icon: '💸', iconBg: '#e0f0ff', important: true, read: true },
                { id: 6, title: 'طلب جلسة عاجلة', description: 'الوارثة فاطمة زروقي تطلب جلسة دعم نفسي عاجلة.', time: 'قبل 5 ساعات', icon: '🆘', iconBg: '#fde8ec', important: false, read: false }
            ];

            const listContainer = document.getElementById('notificationsList');
            let currentFilter = 'all';

            function renderNotifications() {
                let filtered = [...notifications];
                if (currentFilter === 'unread') {
                    filtered = notifications.filter(n => !n.read);
                } else if (currentFilter === 'important') {
                    filtered = notifications.filter(n => n.important);
                }

                if (filtered.length === 0) {
                    listContainer.innerHTML = `<div class="empty-state"><div class="icon">🔔</div><p>لا توجد إشعارات.</p></div>`;
                    return;
                }

                listContainer.innerHTML = filtered.map(n => `
                    <div class="notification-item ${n.read ? '' : 'unread'}" data-id="${n.id}">
                        <div class="notif-icon" style="background:${n.iconBg};">${n.icon}</div>
                        <div class="notif-content">
                            <div class="notif-title">${n.title}</div>
                            <div class="notif-description">${n.description}</div>
                            <div class="notif-time">${n.time}</div>
                        </div>
                        <div class="notif-actions">
                            ${!n.read ? `<button class="btn-sm btn-mark-read mark-read-btn" data-id="${n.id}" data-translate="mark_read">✔ مقروء</button>` : ''}
                            ${n.important ? `<span style="color:var(--red); font-size:18px;">🔴</span>` : ''}
                        </div>
                    </div>
                `).join('');

                document.querySelectorAll('.mark-read-btn').forEach(btn => {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const id = parseInt(this.dataset.id);
                        markAsRead(id);
                    });
                });

                document.querySelectorAll('.notification-item').forEach(item => {
                    item.addEventListener('click', function() {
                        const id = parseInt(this.dataset.id);
                        markAsRead(id);
                    });
                });
            }

            function markAsRead(id) {
                const notif = notifications.find(n => n.id === id);
                if (notif && !notif.read) {
                    notif.read = true;
                    renderNotifications();
                }
            }

            function markAllAsRead() {
                notifications.forEach(n => n.read = true);
                renderNotifications();
            }

            document.querySelectorAll('.filter-option').forEach(opt => {
                opt.addEventListener('click', function() {
                    document.querySelectorAll('.filter-option').forEach(o => o.classList.remove('active'));
                    this.classList.add('active');
                    currentFilter = this.dataset.filter;
                    renderNotifications();
                });
            });

            document.getElementById('markAllRead').addEventListener('click', markAllAsRead);
            renderNotifications();
        

            // Re-render dynamic content on language change
            window.addEventListener('languageChanged', function(e) {
            renderNotifications();
            });
        })();
    </script>
        </body>
</html>
