<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المستخدمين | ورثك فاليد - الحل السريع</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --green-dark:#006633; --green-light:#00A859; --green-bg:#e6f5ee; --red:#D21034; --red-light:#fde8ec; --white:#FFFFFF; --off-white:#F8F9FA; --gray-50:#F7F8FA; --gray-100:#F0F2F5; --gray-200:#E4E7EB; --gray-300:#CBD2D9; --gray-400:#9BA5B2; --gray-500:#7B8794; --gray-700:#3E4C59; --gray-900:#1F2933; --admin-accent:#2c3e50; --shadow-sm:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04); --shadow-md:0 4px 6px rgba(0,0,0,0.07),0 2px 4px rgba(0,0,0,0.06); --shadow-lg:0 10px 25px rgba(0,0,0,0.1),0 4px 10px rgba(0,0,0,0.05); --radius:12px; --radius-lg:16px; --transition:0.2s ease; }
        * { box-sizing:border-box; margin:0; padding:0; }
        body { font-family:'Cairo',sans-serif; background:linear-gradient(135deg,#f0f5f2 0%,#eaf5ee 100%); min-height:100vh; color:var(--gray-900); line-height:1.6; }
        .top-nav { background:var(--white); border-bottom:1px solid var(--gray-200); padding:0 24px; height:64px; display:flex; align-items:center; justify-content:space-between; box-shadow:var(--shadow-sm); position:sticky; top:0; z-index:100; }
        .logo-area { display:flex; align-items:center; gap:10px; }
        .logo-icon { width:36px; height:36px; background:var(--green-dark); border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-weight:800; font-size:18px; }
        .logo-text-nav { font-weight:800; font-size:18px; color:var(--green-dark); }
        .admin-badge { background:var(--admin-accent); color:white; padding:4px 12px; border-radius:20px; font-size:13px; font-weight:600; margin-right:10px; }
        .user-area { display:flex; align-items:center; gap:16px; }
        .back-link { color:var(--green-dark); text-decoration:none; font-weight:600; font-size:14px; cursor:pointer; }
        .back-link:hover { text-decoration:underline; }
        .main-container { max-width:1300px; margin:0 auto; padding:24px; }
        .page-header { margin-bottom:24px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:16px; }
        .greeting { font-size:26px; font-weight:800; color:var(--gray-900); }
        .text-muted { color:var(--gray-500); font-size:13px; }
        .filter-bar { background:var(--white); border-radius:var(--radius-lg); padding:16px 20px; box-shadow:var(--shadow-sm); margin-bottom:24px; display:flex; flex-wrap:wrap; gap:12px; align-items:center; }
        .filter-group { display:flex; align-items:center; gap:8px; flex:1 1 180px; }
        .filter-group label { font-weight:600; font-size:13px; white-space:nowrap; }
        select,input { padding:10px 12px; border:1.5px solid var(--gray-200); border-radius:var(--radius); font-family:'Cairo',sans-serif; font-size:14px; background:var(--off-white); width:100%; }
        select:focus,input:focus { border-color:var(--green-light); outline:none; box-shadow:0 0 0 3px rgba(0,168,89,0.15); }
        .btn { display:inline-flex; align-items:center; justify-content:center; padding:10px 18px; border-radius:var(--radius); font-weight:700; font-family:'Cairo',sans-serif; font-size:14px; cursor:pointer; border:none; transition:all var(--transition); text-decoration:none; color:white; box-shadow:var(--shadow-sm); gap:6px; }
        .btn-primary { background:var(--green-dark); }
        .btn-primary:hover { background:#005a2b; }
        .btn-outline { background:transparent; border:1.5px solid var(--green-dark); color:var(--green-dark); box-shadow:none; }
        .btn-outline:hover { background:rgba(0,102,51,0.05); }
        .btn-sm { padding:6px 14px; font-size:13px; }
        .btn-danger { background:var(--red); color:white; }
        .btn-danger:hover { background:#b00e2b; }
        .btn-warning { background:#f57c00; color:white; }
        .btn-warning:hover { background:#d46a00; }
        .btn-success { background:var(--green-light); }
        .card { background:var(--white); border-radius:var(--radius-lg); box-shadow:var(--shadow-sm); overflow:hidden; }
        .card-body { padding:0; }
        .users-table { width:100%; border-collapse:collapse; }
        .users-table th { background:var(--gray-50); padding:14px 16px; text-align:right; font-weight:700; font-size:13px; color:var(--gray-700); border-bottom:2px solid var(--gray-200); }
        .users-table td { padding:14px 16px; border-bottom:1px solid var(--gray-100); font-size:14px; }
        .users-table tr:hover td { background:var(--gray-50); }
        .user-cell { display:flex; align-items:center; gap:10px; }
        .user-avatar-small { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-weight:700; font-size:14px; flex-shrink:0; }
        .avatar-heir { background:var(--green-dark); }
        .avatar-lawyer { background:#1e5f74; }
        .avatar-investor { background:#1e5f74; }
        .avatar-agency { background:#c3540a; }
        .avatar-expert { background:#b8860b; }
        .avatar-psych { background:#5b2c6f; }
        .avatar-admin { background:#2c3e50; }
        .badge-status { display:inline-block; padding:4px 10px; border-radius:20px; font-size:12px; font-weight:600; }
        .status-active-badge { background:var(--green-bg); color:var(--green-dark); }
        .status-inactive-badge { background:var(--red-light); color:var(--red); }
        .actions-cell { display:flex; gap:6px; flex-wrap:wrap; }
        .pagination { display:flex; justify-content:center; gap:8px; padding:16px; }
        .page-btn { padding:8px 14px; border:1px solid var(--gray-300); border-radius:var(--radius); background:white; cursor:pointer; font-weight:600; transition:var(--transition); }
        .page-btn.active { background:var(--green-dark); color:white; border-color:var(--green-dark); }
        .page-btn:hover:not(.active) { background:var(--gray-100); }
        .modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:300; align-items:center; justify-content:center; }
        .modal-overlay.active { display:flex; }
        .modal { background:white; border-radius:var(--radius-lg); width:90%; max-width:500px; box-shadow:var(--shadow-lg); padding:24px; max-height:80vh; overflow-y:auto; }
        .modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
        .modal-title { font-weight:800; font-size:20px; }
        .close-btn { background:none; border:none; font-size:24px; cursor:pointer; color:var(--gray-500); }
        .input-group { margin-bottom:16px; }
        label { display:block; font-weight:600; margin-bottom:6px; font-size:14px; }
        .footer { text-align:center; padding:16px; font-size:12px; color:var(--gray-400); border-top:1px solid var(--gray-200); margin-top:24px; }
    
        /* Language Switcher */
        .lang-switch {
            display: flex;
            gap: 6px;
            margin-left: 16px;
        }
        .lang-btn {
            padding: 6px 12px;
            border-radius: 20px;
            border: none;
            background: transparent;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            color: var(--gray-700);
            transition: 0.2s;
            font-family: 'Cairo', sans-serif;
        }
        .lang-btn.active {
            background: var(--green-dark);
            color: white;
            box-shadow: 0 2px 6px rgba(0,102,51,0.2);
        }
    </style>
</head>
<body>
    <nav class="top-nav">
        <div class="logo-area">
            <div class="logo-icon">و</div>
            <span class="logo-text-nav" data-translate="brand">ورثك فاليد</span>
            <span class="admin-badge" data-translate="nav_admin">🛡️ مدير النظام</span>
        </div>
        <div class="user-area">
            <div class="lang-switch">
                <button class="lang-btn active" data-lang="ar" data-lang-switch onclick="changeLanguage('ar')">🇩🇿 العربية</button>
                <button class="lang-btn" data-lang="fr" data-lang-switch onclick="changeLanguage('fr')">🇫🇷 Français</button>
                <button class="lang-btn" data-lang="en" data-lang-switch onclick="changeLanguage('en')">🇬🇧 English</button>
            </div>
            <a href="manager-dashboard.html" class="back-link" data-translate="back_to_dashboard">↩ لوحة التحكم</a>
        </div>
    </nav>
    <div class="main-container">
        <div class="page-header">
            <div>
                <h1 class="greeting" data-translate="users_title">إدارة المستخدمين</h1>
                <p class="text-muted" data-translate="users_subtitle">إدارة حسابات المنصة، تفعيل وتعطيل المستخدمين، وتغيير الأدوار.</p>
            </div>
            <button class="btn btn-primary" id="addUserBtn" data-translate="users_add">➕ إضافة مستخدم جديد</button>
        </div>
        <div class="filter-bar">
            <div class="filter-group"><label data-translate="users_role_filter">الدور</label><select id="filterRole"><option value="">الكل</option><option data-translate="role_heir">وارث</option><option data-translate="role_lawyer">محامي</option><option data-translate="role_investor">مستثمر</option><option data-translate="role_agency">وكالة عقارية</option><option data-translate="role_expert">خبير مالي</option><option data-translate="role_psychologist">أخصائي نفسي</option><option data-translate="role_admin">مدير</option></select></div>
            <div class="filter-group"><label data-translate="users_status_filter">الحالة</label><select id="filterStatus"><option value="">الكل</option><option data-translate="active">نشط</option><option data-translate="inactive">غير نشط</option></select></div>
            <div class="filter-group" style="flex:2;"><label>بحث</label><input type="text" id="searchInput" data-translate-placeholder="ph_name_or_email" placeholder="اسم أو بريد إلكتروني..."></div>
            <button class="btn btn-outline btn-sm" id="applyFilterBtn" data-translate="apply_filter">🔍 تطبيق</button>
        </div>
        <div class="card">
            <div class="card-body">
                <table class="users-table">
                    <thead><tr><th data-translate="users_table_user">المستخدم</th><th data-translate="users_table_role">الدور</th><th data-translate="users_table_wilaya">الولاية</th><th data-translate="users_table_status">الحالة</th><th data-translate="users_table_date">تاريخ التسجيل</th><th data-translate="users_table_actions">إجراءات</th></tr></thead>
                    <tbody id="usersTableBody"></tbody>
                </table>
                <div class="pagination" id="pagination"></div>
            </div>
        </div>
    </div>
    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <div class="modal-header"><span class="modal-title" id="modalTitle" data-translate="users_edit_title">تعديل مستخدم</span><button class="close-btn" id="closeEditModal">&times;</button></div>
            <form id="editUserForm">
                <input type="hidden" id="editUserId">
                <div class="input-group"><label data-translate="users_full_name">الاسم الكامل</label><input type="text" id="editName" required></div>
                <div class="input-group"><label data-translate="users_email">البريد الإلكتروني</label><input type="email" id="editEmail" required></div>
                <div class="input-group"><label data-translate="users_table_role">الدور</label><select id="editRole"><option data-translate="role_heir">وارث</option><option data-translate="role_lawyer">محامي</option><option data-translate="role_investor">مستثمر</option><option data-translate="role_agency">وكالة عقارية</option><option data-translate="role_expert">خبير مالي</option><option data-translate="role_psychologist">أخصائي نفسي</option><option data-translate="role_admin">مدير</option></select></div>
                <div class="input-group"><label>الولاية</label><input type="text" id="editWilaya" data-translate-placeholder="ph_example_alger" placeholder="مثال: الجزائر العاصمة"></div>
                <button type="submit" class="btn btn-primary" style="width:100%;" data-translate="save_changes">💾 حفظ التغييرات</button>
            </form>
        </div>
    </div>
    <div class="footer" data-translate="footer">©2026 ورثك فاليد - الحل السريع. جميع الحقوق محفوظة. الجزائر.</div>
    <script src="js/translations.js"></script>
<script src="js/i18n.js"></script>
<script>
        (function() {
            const users = [
                { id:1, name:'محمد بن صالح', email:'mohamed@mail.dz', role:'وارث', wilaya:'الجزائر العاصمة', status:'نشط', date:'2026-01-10', avatarClass:'avatar-heir', avatarLetter:'م' },
                { id:2, name:'الأستاذ كمال بومدين', email:'kamel@law.dz', role:'محامي', wilaya:'وهران', status:'نشط', date:'2026-02-14', avatarClass:'avatar-lawyer', avatarLetter:'ك' },
                { id:3, name:'ليلى بن عمار', email:'leila@invest.dz', role:'مستثمر', wilaya:'قسنطينة', status:'نشط', date:'2026-03-01', avatarClass:'avatar-investor', avatarLetter:'ل' },
                { id:4, name:'نور الدين سليماني', email:'nour@agency.dz', role:'وكالة عقارية', wilaya:'الجزائر العاصمة', status:'نشط', date:'2026-01-20', avatarClass:'avatar-agency', avatarLetter:'ن' },
                { id:5, name:'رشيد زعيمي', email:'rachid@fin.dz', role:'خبير مالي', wilaya:'وهران', status:'نشط', date:'2026-02-01', avatarClass:'avatar-expert', avatarLetter:'ر' },
                { id:6, name:'سامية بوجملين', email:'samia@psy.dz', role:'أخصائي نفسي', wilaya:'الجزائر العاصمة', status:'نشط', date:'2026-03-15', avatarClass:'avatar-psych', avatarLetter:'س' },
                { id:7, name:'عادل زعيم', email:'adel@admin.dz', role:'مدير', wilaya:'الجزائر العاصمة', status:'نشط', date:'2025-12-01', avatarClass:'avatar-admin', avatarLetter:'ع' },
                { id:8, name:'سفيان بلقاسم', email:'sofiane@invest.dz', role:'مستثمر', wilaya:'وهران', status:'غير نشط', date:'2026-04-05', avatarClass:'avatar-investor', avatarLetter:'س' },
                { id:9, name:'فاطمة زروقي', email:'fatima@mail.dz', role:'وارث', wilaya:'البليدة', status:'نشط', date:'2026-02-20', avatarClass:'avatar-heir', avatarLetter:'ف' }
            ];
            let filteredUsers = [...users];
            const rowsPerPage = 6;
            let currentPage = 1;
            const tableBody = document.getElementById('usersTableBody');
            const paginationEl = document.getElementById('pagination');
            const editModal = document.getElementById('editModal');
            const editForm = document.getElementById('editUserForm');
            function applyFilters() {
                const role = document.getElementById('filterRole').value;
                const status = document.getElementById('filterStatus').value;
                const search = document.getElementById('searchInput').value.toLowerCase();
                filteredUsers = users.filter(u => (!role || u.role === role) && (!status || u.status === status) && (!search || u.name.includes(search) || u.email.includes(search)));
                currentPage = 1;
                renderTable();
            }
            function renderTable() {
                const totalPages = Math.ceil(filteredUsers.length / rowsPerPage) || 1;
                const start = (currentPage - 1) * rowsPerPage;
                const pageUsers = filteredUsers.slice(start, start + rowsPerPage);
                tableBody.innerHTML = pageUsers.map(u => `<tr><td><div class="user-cell"><div class="user-avatar-small ${u.avatarClass}">${u.avatarLetter}</div><div><div style="font-weight:600;">${u.name}</div><div style="font-size:12px; color:var(--gray-500);">${u.email}</div></div></div></td><td>${u.role}</td><td>${u.wilaya}</td><td><span class="badge-status ${u.status === 'نشط' ? 'status-active-badge' : 'status-inactive-badge'}">${u.status}</span></td><td>${u.date}</td><td><div class="actions-cell"><button class="btn btn-sm btn-outline edit-user" data-id="${u.id}" data-translate="edit">✏️ تعديل</button>${u.status === 'نشط' ? '<button class="btn btn-sm btn-warning toggle-status" data-id="'+u.id+'" data-translate="disable">⏸️ تعطيل</button>' : '<button class="btn btn-sm btn-success toggle-status" data-id="'+u.id+'" data-translate="enable">▶️ تفعيل</button>'}${u.role !== 'مدير' ? '<button class="btn btn-sm btn-danger delete-user" data-id="'+u.id+'" data-translate="delete">🗑️ حذف</button>' : ''}</div></td></tr>`).join('');
                let paginationHTML = '';
                for (let i = 1; i <= totalPages; i++) { paginationHTML += `<button class="page-btn ${i === currentPage ? 'active' : ''}" data-page="${i}">${i}</button>`; }
                paginationEl.innerHTML = paginationHTML;
                document.querySelectorAll('.page-btn').forEach(btn => { btn.addEventListener('click', function() { currentPage = parseInt(this.dataset.page); renderTable(); }); });
                attachRowEvents();
            }
            function attachRowEvents() {
                document.querySelectorAll('.edit-user').forEach(btn => { btn.addEventListener('click', function() { const id = parseInt(this.dataset.id); const user = users.find(u => u.id === id); if (user) openEditModal(user); }); });
                document.querySelectorAll('.toggle-status').forEach(btn => { btn.addEventListener('click', function() { const id = parseInt(this.dataset.id); const user = users.find(u => u.id === id); if (user) { user.status = user.status === 'نشط' ? 'غير نشط' : 'نشط'; applyFilters(); } }); });
                document.querySelectorAll('.delete-user').forEach(btn => { btn.addEventListener('click', function() { const id = parseInt(this.dataset.id); const user = users.find(u => u.id === id); if (user && confirm(tv('confirm_delete_user', {name: user.name}))) { const index = users.indexOf(user); if (index > -1) users.splice(index, 1); applyFilters(); } }); });
            }
            function openEditModal(user) { document.getElementById('editUserId').value = user.id; document.getElementById('editName').value = user.name; document.getElementById('editEmail').value = user.email; document.getElementById('editRole').value = user.role; document.getElementById('editWilaya').value = user.wilaya; editModal.classList.add('active'); }
            editForm.addEventListener('submit', function(e) { e.preventDefault(); const id = parseInt(document.getElementById('editUserId').value); const user = users.find(u => u.id === id); if (user) { user.name = document.getElementById('editName').value; user.email = document.getElementById('editEmail').value; user.role = document.getElementById('editRole').value; user.wilaya = document.getElementById('editWilaya').value; user.avatarLetter = user.name.charAt(0); const roleClassMap = {'وارث':'avatar-heir','محامي':'avatar-lawyer','مستثمر':'avatar-investor','وكالة عقارية':'avatar-agency','خبير مالي':'avatar-expert','أخصائي نفسي':'avatar-psych','مدير':'avatar-admin'}; user.avatarClass = roleClassMap[user.role] || 'avatar-heir'; applyFilters(); } editModal.classList.remove('active'); });
            document.getElementById('closeEditModal').addEventListener('click', () => editModal.classList.remove('active'));
            window.addEventListener('click', (e) => { if (e.target === editModal) editModal.classList.remove('active'); });
            document.getElementById('applyFilterBtn').addEventListener('click', applyFilters);
            document.getElementById('addUserBtn').addEventListener('click', () => { alert(t('msg_redirect_add_user')); });
            applyFilters();
        

            // Re-render dynamic content on language change
            window.addEventListener('languageChanged', function(e) {
            applyFilters();
            });
        })();
    </script>
</body>
</html>
